<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Java Script loop</title>
    </head>
    <body>
        <script>
            let studentList=[
                ["jin",23],
                "vin",
                "min"
            ]
            for(let i=0;i<studentList.length;i++){
                console.log(studentList[0][0])
            }
            let i=0;
            while(i<=studentList.length){
                console.log(studentList[5]);
                i++;
            }
            //forof
            for(let x of studentList){
                console.log(x);
            }
        </script>
    </body>
