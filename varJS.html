<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Java Script</title>

    </head>
    <body>
        <script>
            //JS Variables-- contains either value or not
            var myName="xyz";//global can be redeclared
            document.write(myName);
            console.log(myName);

            function demo(){
                var msg="HELL0";
                console.log(msg);
            }
            demo();
            //var declaration using let and const
            let myNumber=12345678;
            console.log(myNumber);

            myNumber=673478;//no redeclare but redefine

            const myEmail="dd@gmail.com";
            console.log(myEmail);

            myEmail="abc@gmail.com"//no redeclare and no reassign
            

        </script>
    </body>
</html>
